<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">

  <title>준영 ♥ 인비 결혼합니다</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="준영 ♥ 인비 결혼합니다">
  <meta property="og:description" content="저희의 결혼식에 초대합니다">
  <meta property="og:image" content="https://raw.githubusercontent.com/Readycouple1018/JYIB/refs/heads/main/images/og/1.jpg">
  <meta property="og:url" content="https://readycouple1018.github.io/JYIB/">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR&family=Cormorant+Garamond&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>

  <!-- ✅ Kakao SDK -->
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
</head>

<body>

  <!-- 🎵 BGM -->
  <audio id="bgm" loop>
    <source src="music/bgm.mp3" type="audio/mpeg">
  </audio>

  <!-- ═══ Curtain ═══ -->
  <div id="curtain" class="curtain">
    <div class="curtain__left"></div>
    <div class="curtain__right"></div>
    <div class="curtain__content">
      <p class="curtain__subtitle">Wedding Invitation</p>
      <p class="curtain__names" id="curtainNames"></p>
      <button class="curtain__btn" id="curtainBtn">초대장 열기</button>
    </div>
  </div>

  <canvas id="petalCanvas" class="petal-canvas"></canvas>
  <div id="toast" class="toast"></div>

  <!-- ═══ Modal ═══ -->
  <div id="photoModal" class="photo-modal">
    <button id="modalClose">&times;</button>
    <button id="modalPrev">&#8249;</button>
    <button id="modalNext">&#8250;</button>
    <div id="modalContainer">
      <img id="modalImg">
    </div>
    <div id="modalCounter"></div>
  </div>

  <main>

    <!-- ═══ Hero ═══ -->
    <section class="section hero" id="hero">

      <!-- ✅ 음악 버튼 -->
      <button id="musicToggle" class="music-toggle">🎵</button>

      <img id="heroPhoto">
      <h1 id="heroNames"></h1>
      <p id="heroDate"></p>
      <p id="heroVenue"></p>

      <div id="countdown">
        <span id="countDays"></span>
        <span id="countHours"></span>
        <span id="countMinutes"></span>
        <span id="countSeconds"></span>
      </div>
    </section>

    <!-- Greeting -->
    <section id="greeting">
      <h2 id="greetingTitle"></h2>
      <p id="greetingContent"></p>
      <div id="greetingParents"></div>
    </section>

    <!-- Calendar -->
    <section>
      <div id="calendarGrid"></div>
      <a id="googleCalBtn">Google 캘린더</a>
      <button id="icsDownloadBtn">Apple 캘린더</button>
    </section>

    <!-- Story -->
    <section id="story">
      <h2 id="storyTitle"></h2>
      <p id="storyContent"></p>
      <div id="storyPhotos"></div>
    </section>

    <!-- Gallery -->
    <section id="gallery">
      <div id="galleryGrid"></div>
    </section>

    <!-- Location -->
    <section id="location">
      <p id="locationVenue"></p>
      <p id="locationHall"></p>
      <p id="locationAddress"></p>
      <p id="locationTel"></p>

      <button id="copyAddressBtn">주소 복사</button>

      <img id="locationMapImg">

      <a id="kakaoMapBtn">카카오맵</a>
      <a id="naverMapBtn">네이버지도</a>
    </section>

    <!-- Account -->
    <section id="account">
      <div id="groomAccountList"></div>
      <div id="brideAccountList"></div>
    </section>

    <!-- ✅ 카카오 공유 버튼 -->
    <section style="text-align:center; margin:40px 0;">
      <button id="kakaoShareBtn" class="btn btn--kakao">
        카카오톡으로 초대장 공유하기
      </button>
    </section>

    <!-- Footer -->
    <footer>
      <p id="footerText"></p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
